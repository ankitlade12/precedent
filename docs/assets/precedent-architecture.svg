<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Precedent architecture and data flow</title>
  <desc id="desc">Slack conversations flow through an AI proposer and human confirmation into a deterministic append-only decision ledger. People recall current precedent in Slack, while Slackbot and other agents consult the same ledger through MCP. Every result includes source receipts and every MCP call is audited.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171126"/>
      <stop offset="1" stop-color="#251437"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36c5f0"/>
      <stop offset="1" stop-color="#2eb67d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#090511" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9a9ca"/>
    </marker>
    <style>
      .title { font: 700 44px Inter, ui-sans-serif, system-ui, sans-serif; fill: #fff; }
      .subtitle { font: 400 21px Inter, ui-sans-serif, system-ui, sans-serif; fill: #cbbfd7; }
      .lane { font: 700 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #bfaed0; letter-spacing: 1.8px; }
      .box-title { font: 700 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #fff; }
      .box-text { font: 400 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #d8d0e0; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #bfaed0; }
      .pill { font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #111; letter-spacing: .5px; }
      .card { fill: #2d2140; stroke: #5b496f; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .core { fill: #233b37; stroke: #2eb67d; stroke-width: 3; rx: 18; filter: url(#shadow); }
      .surface { fill: #29243f; stroke: #36c5f0; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .agent { fill: #39213a; stroke: #e01e5a; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .line { fill: none; stroke: #b9a9ca; stroke-width: 3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #8a749e; stroke-width: 2.5; stroke-dasharray: 9 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="62" width="10" height="78" rx="5" fill="url(#accent)"/>
  <text x="105" y="105" class="title">Precedent</text>
  <text x="105" y="137" class="subtitle">Human-confirmed decision memory for people and agents</text>

  <text x="90" y="208" class="lane">SLACK SURFACES</text>
  <text x="545" y="208" class="lane">TRUST BOUNDARY</text>
  <text x="1040" y="208" class="lane">DETERMINISTIC MEMORY</text>

  <rect x="80" y="238" width="370" height="205" class="surface"/>
  <rect x="105" y="263" width="126" height="27" rx="14" fill="#36c5f0"/>
  <text x="122" y="282" class="pill">1 · CAPTURE</text>
  <text x="105" y="326" class="box-title">Slack conversation</text>
  <text x="105" y="360" class="box-text">Ambient decision detection</text>
  <text x="105" y="386" class="box-text">Thread context + real permalinks</text>
  <text x="105" y="412" class="small">“We’re switching from Postgres to SQLite…”</text>

  <rect x="535" y="238" width="390" height="205" class="card"/>
  <rect x="560" y="263" width="124" height="27" rx="14" fill="#ecb22e"/>
  <text x="577" y="282" class="pill">2 · PROPOSE</text>
  <text x="560" y="326" class="box-title">Claude structured extraction</text>
  <text x="560" y="360" class="box-text">Statement · rationale · alternatives</text>
  <text x="560" y="386" class="box-text">Scope · deciders · source citations</text>
  <text x="560" y="416" class="small">Model output is never authoritative</text>

  <rect x="1030" y="238" width="490" height="205" class="core"/>
  <rect x="1055" y="263" width="133" height="27" rx="14" fill="#2eb67d"/>
  <text x="1072" y="282" class="pill">4 · COMMIT</text>
  <text x="1055" y="326" class="box-title">Append-only decision ledger</text>
  <text x="1055" y="360" class="box-text">Content-addressed IDs + hash chain</text>
  <text x="1055" y="386" class="box-text">Supersession graph resolves current truth</text>
  <text x="1055" y="416" class="small">SQLite triggers reject updates and deletes</text>

  <rect x="535" y="505" width="390" height="170" class="surface"/>
  <rect x="560" y="530" width="137" height="27" rx="14" fill="#36c5f0"/>
  <text x="577" y="549" class="pill">3 · CONFIRM</text>
  <text x="560" y="593" class="box-title">Native Block Kit review</text>
  <text x="560" y="627" class="box-text">Confirm · Edit · Dismiss</text>
  <text x="560" y="653" class="small">Old → new lifecycle shown before commit</text>

  <rect x="80" y="505" width="370" height="170" class="surface"/>
  <rect x="105" y="530" width="119" height="27" rx="14" fill="#36c5f0"/>
  <text x="122" y="549" class="pill">5 · RECALL</text>
  <text x="105" y="593" class="box-title">Current precedent in Slack</text>
  <text x="105" y="627" class="box-text">Current call · history · receipts</text>
  <text x="105" y="653" class="small">Slash command, mention, Home, relitigation guard</text>

  <rect x="1030" y="505" width="490" height="170" class="agent"/>
  <rect x="1055" y="530" width="140" height="27" rx="14" fill="#e01e5a"/>
  <text x="1072" y="549" class="pill" fill="#fff">6 · CONSULT</text>
  <text x="1055" y="593" class="box-title">Slackbot + other agents via MCP</text>
  <text x="1055" y="627" class="box-text">Same current decision, history, and receipts</text>
  <text x="1055" y="653" class="small">Slack-signed auth · bearer auth · audit event</text>

  <path d="M450 340 H535" class="line"/>
  <path d="M730 443 V505" class="line"/>
  <path d="M925 590 H980 V340 H1030" class="line"/>
  <path d="M1030 395 H980 V710 H265 V675" class="line"/>
  <path d="M1255 505 V443" class="line"/>
  <path d="M1300 443 V505" class="dash"/>

  <rect x="80" y="744" width="1440" height="92" rx="18" fill="#21192f" stroke="#4d3f5e" stroke-width="2"/>
  <circle cx="125" cy="790" r="18" fill="#2eb67d"/>
  <path d="M116 790 l6 6 13-15" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="782" class="box-title">Trust invariant</text>
  <text x="160" y="811" class="box-text">The model proposes. A human confirms. Deterministic code decides what is current. Every answer links back to genuine Slack evidence.</text>
</svg>
